name: "Terraform GCP Deployment - V2 Modular"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform-gcp-cloud-v2/**'
      
jobs:
  deploy-v2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform-gcp-cloud-v2/environments/dev/
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}

    steps:
      - name: Clone Code Repository
        uses: actions/checkout@v4

      - name: Install Terraform Engine on Runner
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.1

      - name: Initialize Workspace
        run: terraform init

      - name: Format Check
        run: terraform fmt -check

      - name: Execute and Build (Terraform Apply)
        run: terraform destroy -auto-approve